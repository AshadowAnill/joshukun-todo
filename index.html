<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="助手くんやることリスト：チェックリスト＋スタンプ帳">
<meta name="theme-color" content="#ffd6e6">
<title>助手くんやることリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-bg-1: #fff5fa;
    --pink-bg-2: #ffe1ed;
    --pink-dot: rgba(255, 105, 180, 0.07);
    --pink-primary: #ff4d94;
    --pink-soft: #ff70a8;
    --pink-frame: #ffb3d1;
    --pink-frame-fill: #fff8fb;
    --pink-row-bg: #fffafc;
    --pink-row-hover: #fff0f6;
    --pink-row-active: #ffe5ee;
    --pink-tab-inactive: #ffeaf2;
    --pink-tab-border: #ffd0e0;
    --pink-divider: #ffd6e6;
    --text-dark: #4d3a44;
    --text-muted: #8a6b76;
    --text-foot: #b89aa3;
    --warn-bg: #fff3cd;
    --warn-text: #8a6500;
    --wd-sat: #6694c7;
    --wd-sun: #cc5e8c;
    --card-shadow:
      0 12px 40px rgba(255, 112, 168, 0.14),
      0 2px 8px rgba(255, 112, 168, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    color: var(--text-dark);
    background:
      radial-gradient(circle at 1px 1px, var(--pink-dot) 1px, transparent 0) 0 0 / 18px 18px,
      linear-gradient(180deg, var(--pink-bg-1) 0%, var(--pink-bg-2) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 28px 16px 40px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 22px;
    padding: 32px 24px 28px;
    box-shadow: var(--card-shadow);
    position: relative;
    border: 1px solid #ffe5ee;
  }

  .container::before,
  .container::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ffd0e0;
    top: 14px;
  }
  .container::before { left: 16px; }
  .container::after  { right: 16px; }

  .warning {
    background: var(--warn-bg);
    color: var(--warn-text);
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  .warning[hidden] { display: none; }

  /* === Header === */
  .header {
    text-align: center;
    margin-bottom: 20px;
    padding-top: 4px;
  }

  .title {
    /* clamp 流体化: W320 で 19px, W500+ で 26px に連続スケール */
    font-size: clamp(19px, calc(4vw + 6px), 26px);
    font-weight: 900;
    color: var(--pink-primary);
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 10px;
    display: inline-block;
    position: relative;
  }
  .title::before,
  .title::after {
    content: '♡';
    color: var(--pink-soft);
    /* em ベースで title font-size に連動（現状の 16/26 ≈ 0.615 を踏襲） */
    font-size: 0.62em;
    font-weight: 700;
    vertical-align: 4px;
  }
  /* 外側 margin = 0、内側 margin = 0.3em（現状の 8/26 ≈ 0.308 を踏襲） */
  .title::before { margin-left: 0; margin-right: 0.3em; }
  .title::after  { margin-left: 0.3em; margin-right: 0; }

  .date {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* === Tabs === */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 8px;
    margin-bottom: 0;
    position: relative;
    z-index: 1;
  }

  .tab {
    flex: 1;
    padding: 10px 12px;
    background: var(--pink-tab-inactive);
    border: 1.5px solid var(--pink-tab-border);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background-color 150ms ease, color 150ms ease, transform 100ms ease;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.04em;
  }

  .tab:hover {
    background: #ffe0ec;
    color: var(--pink-primary);
  }

  .tab.active {
    background: #fffafc;
    color: var(--pink-primary);
    border-color: var(--pink-soft);
    margin-bottom: -1.5px;
    padding-bottom: 11.5px;
    position: relative;
    z-index: 2;
  }

  .tab:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 77, 148, 0.35);
  }

  /* === Panels === */
  .panels {
    background: #fffafc;
    border: 1.5px solid var(--pink-soft);
    border-radius: 14px;
    border-top-left-radius: 0;
    padding: 16px 14px;
    position: relative;
    z-index: 0;
  }

  .panels.right-active {
    border-top-left-radius: 14px;
    border-top-right-radius: 0;
  }

  .panel { display: none; }
  .panel.active {
    display: block;
    animation: panel-in 200ms ease-out;
  }
  @keyframes panel-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* === Todo list === */
  .list { list-style: none; }

  .item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 14px;
    margin-bottom: 10px;
    background: #ffffff;
    border-radius: 14px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 76px;
    transition: background-color 150ms ease;
    outline: none;
  }
  .item:last-child { margin-bottom: 0; }
  @media (hover: hover) {
    .item:hover { background: var(--pink-row-hover); }
  }
  .item:active { background: var(--pink-row-active); }
  .item:focus-visible {
    box-shadow: 0 0 0 3px rgba(255, 77, 148, 0.35);
  }

  .frame {
    position: relative;
    width: 56px;
    height: 56px;
    border: 2px dashed var(--pink-frame);
    border-radius: 10px;
    background: var(--pink-frame-fill);
    flex-shrink: 0;
  }

  .stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 82px;
    height: 82px;
    background-image: url('stamp.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
    transform: translate(-50%, -50%) rotate(-9deg) scale(0);
    transition: transform 320ms cubic-bezier(0.34, 1.7, 0.5, 1);
    will-change: transform;
    z-index: 1;
  }

  .item.checked .stamp {
    transform: translate(-50%, -50%) rotate(-9deg) scale(1);
  }

  .label {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.45;
    letter-spacing: 0.02em;
    flex: 1;
  }
  .item.checked .label {
    color: var(--text-muted);
    transition: color 200ms ease 80ms;
  }

  /* === Calendar === */
  .calendar-wrap { padding: 2px 0; }

  .weekday-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
    padding: 0 2px;
  }

  .wd {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    padding: 2px 0;
  }
  .wd-sat { color: var(--wd-sat); }
  .wd-sun { color: var(--wd-sun); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    padding: 0 2px;
  }

  .cal-cell {
    aspect-ratio: 1 / 1;
    position: relative;
    border: 1.5px solid var(--pink-frame);
    border-radius: 8px;
    background: #ffffff;
    padding: 3px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    user-select: none;
    overflow: visible;
    letter-spacing: 0;
    line-height: 1;
    transition: background-color 150ms ease, border-color 150ms ease, transform 80ms ease;
  }

  .cal-cell.today {
    border: 2.5px solid var(--pink-primary);
    padding: 2px 3px;
    color: var(--pink-primary);
  }

  .cal-cell.clickable {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) {
    .cal-cell.clickable:hover {
      background: #fff0f6;
      border-color: var(--pink-soft);
    }
  }
  .cal-cell.clickable:active { transform: scale(0.95); }

  .cal-date {
    position: relative;
    z-index: 0;
  }

  .cal-stamp { display: none; }

  /* Pink stamp: native PNG color */
  .cal-cell.stamped-pink .cal-stamp {
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    width: 110%;
    height: 110%;
    background-image: url('stamp.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    transform: translate(-50%, -50%) rotate(-9deg);
    pointer-events: none;
    z-index: 1;
  }

  /* Pink stamp drop-in animation (auto-switch from todo + manual past-day stamp) */
  .cal-cell.stamped-pink.animate .cal-stamp {
    animation: stamp-drop 360ms cubic-bezier(0.34, 1.7, 0.5, 1);
  }
  @keyframes stamp-drop {
    0%   { transform: translate(-50%, -50%) rotate(-9deg) scale(0); }
    100% { transform: translate(-50%, -50%) rotate(-9deg) scale(1); }
  }

  /* === Modal === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(50, 30, 40, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    animation: overlay-in 180ms ease-out;
  }
  .modal-overlay[hidden] { display: none; }
  @keyframes overlay-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal {
    background: #ffffff;
    border-radius: 18px;
    padding: 26px 24px 20px;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    border: 1.5px solid var(--pink-soft);
    text-align: center;
    animation: modal-in 240ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal-title {
    font-size: 17px;
    font-weight: 900;
    color: var(--pink-primary);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }

  .modal-date {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .modal-btn {
    flex: 1;
    max-width: 130px;
    padding: 11px 16px;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    border: 1.5px solid;
    transition: background-color 150ms ease, transform 80ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:active { transform: scale(0.96); }
  .modal-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 77, 148, 0.35);
  }

  .modal-btn-no {
    background: #fff;
    color: var(--text-muted);
    border-color: #e0d0d6;
  }
  .modal-btn-no:hover { background: #f5eef0; }

  .modal-btn-yes {
    background: var(--pink-primary);
    color: #fff;
    border-color: var(--pink-primary);
  }
  .modal-btn-yes:hover { background: #ff3a85; }

  /* === Footer === */
  .footer {
    text-align: center;
    margin-top: 22px;
    padding-top: 14px;
    border-top: 1px dashed var(--pink-divider);
    font-size: 11px;
    color: var(--text-foot);
    font-weight: 400;
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  /* === Mobile === */
  @media (max-width: 380px) {
    body { padding: 18px 10px 30px; }
    .container { padding: 26px 16px 22px; border-radius: 18px; }
    /* .title 系は clamp / em で連続スケールするため、mobile クエリでの上書き不要 */
    .date { font-size: 13px; }

    .tab { padding: 9px 8px; font-size: 13px; }
    .panels { padding: 12px 8px; }

    .label { font-size: 15px; }
    .frame { width: 50px; height: 50px; }
    .stamp { width: 74px; height: 74px; }
    .item { min-height: 68px; padding: 10px 12px; gap: 12px; }

    .weekday-header { gap: 3px; padding: 0 1px; }
    .cal-grid { gap: 3px; padding: 0 1px; }
    .wd { font-size: 11px; }
    .cal-cell { font-size: 9.5px; padding: 2px 3px; }
    .cal-cell.today { padding: 1px 2px; }

    .modal { padding: 22px 18px 18px; }
    .modal-title { font-size: 16px; }
    .modal-date { font-size: 14px; margin-bottom: 18px; }
    .modal-btn { font-size: 14px; padding: 10px 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .stamp,
    .cal-cell.stamped-pink.animate .cal-stamp { transition: none; animation: none; }
    .panel.active,
    .modal-overlay,
    .modal { animation: none; }
    .item.checked .label { transition: none; }
  }
</style>
</head>
<body>
  <main class="container">
    <div class="warning" id="warning" hidden>
      ⚠ このブラウザではチェック状態が保存されません（プライベートブラウジング等）
    </div>

    <header class="header">
      <h1 class="title">助手くんやることリスト</h1>
      <p class="date" id="date"></p>
    </header>

    <nav class="tabs" role="tablist" aria-label="表示切替">
      <button class="tab active" role="tab" data-tab="todo"  aria-selected="true"  aria-controls="panel-todo">やること</button>
      <button class="tab"        role="tab" data-tab="stamp" aria-selected="false" aria-controls="panel-stamp">スタンプ帳</button>
    </nav>

    <div class="panels" id="panels">
      <section class="panel active" id="panel-todo" data-tab="todo" role="tabpanel">
        <ul class="list" id="list"></ul>
      </section>

      <section class="panel" id="panel-stamp" data-tab="stamp" role="tabpanel">
        <div class="calendar-wrap">
          <div class="weekday-header" aria-hidden="true">
            <span class="wd">月</span>
            <span class="wd">火</span>
            <span class="wd">水</span>
            <span class="wd">木</span>
            <span class="wd">金</span>
            <span class="wd wd-sat">土</span>
            <span class="wd wd-sun">日</span>
          </div>
          <div class="cal-grid" id="calendar-grid"></div>
        </div>
      </section>
    </div>

    <footer class="footer">
      非公式ファンメイドサイト
    </footer>
  </main>

  <!-- Manual stamp confirmation modal -->
  <div class="modal-overlay" id="modal-overlay" hidden role="presentation">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 class="modal-title" id="modal-title">スタンプを押しますか？</h2>
      <p class="modal-date" id="modal-date"></p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-no"  id="modal-no">いいえ</button>
        <button class="modal-btn modal-btn-yes" id="modal-yes">はい</button>
      </div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  // ====== Config ======
  const ITEMS = [
    'こよの曲を聴く',
    'こよのShorts見る',
    '「こよちゃん大好き！」と言う',
    'こよのコト考える',
    'こよのアーカイブ見る'
  ];
  const START_DATE = '2026-05-11'; // inclusive, should be Monday
  const END_DATE   = '2026-06-06'; // inclusive, should be Sunday

  const STORAGE_KEY = 'joshukun-todo';
  const STORAGE_VERSION = 2;
  const TAB_TODO = 'todo';
  const TAB_STAMP = 'stamp';
  const AUTO_SWITCH_DELAY_MS = 400;
  // =====================

  let state = null;
  let activeTab = TAB_TODO;
  let storageAvailable = true;
  let modalCleanup = null;

  // ====== JST date helpers ======
  function getJSTParts() {
    const shifted = new Date(Date.now() + 9 * 60 * 60 * 1000);
    return {
      y:   shifted.getUTCFullYear(),
      m:   shifted.getUTCMonth() + 1,
      d:   shifted.getUTCDate(),
      dow: shifted.getUTCDay()
    };
  }

  function getJSTDateString() {
    const p = getJSTParts();
    return p.y + '-' + String(p.m).padStart(2, '0') + '-' + String(p.d).padStart(2, '0');
  }

  function getJSTDateDisplay() {
    const p = getJSTParts();
    const dows = ['日', '月', '火', '水', '木', '金', '土'];
    return p.y + '年' + p.m + '月' + p.d + '日（' + dows[p.dow] + '）';
  }

  function dowFromDateString(dateStr) {
    const parts = dateStr.split('-');
    const dt = new Date(Date.UTC(+parts[0], +parts[1] - 1, +parts[2]));
    const dows = ['日', '月', '火', '水', '木', '金', '土'];
    return dows[dt.getUTCDay()];
  }

  // ====== Calendar range helpers ======
  function parseDateString(s) {
    const parts = s.split('-');
    return new Date(Date.UTC(+parts[0], +parts[1] - 1, +parts[2]));
  }
  function formatDate(d) {
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }
  function isInCalendarRange(dateStr) {
    return dateStr >= START_DATE && dateStr <= END_DATE;
  }
  function getCalendarDates() {
    const start = parseDateString(START_DATE);
    const end = parseDateString(END_DATE);
    const out = [];
    let cur = start;
    while (cur.getTime() <= end.getTime()) {
      out.push(formatDate(cur));
      cur = new Date(cur.getTime() + 86400000);
    }
    return out;
  }

  // ====== Storage & Migration ======
  function makeFreshState(carryCalendar) {
    return {
      v: STORAGE_VERSION,
      date: getJSTDateString(),
      checked: ITEMS.map(function () { return false; }),
      switched: false,
      calendar: carryCalendar || {}
    };
  }

  // Normalize a calendar object so every value is the literal `true`.
  // Anything else (including unexpected strings) is dropped.
  function normalizeCalendar(cal) {
    const out = {};
    if (!cal || typeof cal !== 'object') return out;
    Object.keys(cal).forEach(function (k) {
      if (cal[k] === true) out[k] = true;
    });
    return out;
  }

  function migrateV1ToV2(v1) {
    if (
      !v1 ||
      typeof v1.date !== 'string' ||
      !Array.isArray(v1.checked) ||
      v1.checked.length !== ITEMS.length
    ) {
      return makeFreshState();
    }
    const today = getJSTDateString();
    const allChecked = v1.checked.every(function (c) { return c === true; });

    const calendar = {};
    if (allChecked && isInCalendarRange(v1.date)) {
      calendar[v1.date] = true;
    }

    if (v1.date === today) {
      return {
        v: 2,
        date: today,
        checked: v1.checked.slice(),
        switched: allChecked,
        calendar: calendar
      };
    }
    return {
      v: 2,
      date: today,
      checked: ITEMS.map(function () { return false; }),
      switched: false,
      calendar: calendar
    };
  }

  function validateV2(parsed) {
    if (
      !parsed ||
      parsed.v !== STORAGE_VERSION ||
      typeof parsed.date !== 'string' ||
      !Array.isArray(parsed.checked) ||
      parsed.checked.length !== ITEMS.length ||
      typeof parsed.switched !== 'boolean' ||
      typeof parsed.calendar !== 'object' ||
      parsed.calendar === null
    ) return null;
    return parsed;
  }

  function loadState() {
    let raw = null;
    try { raw = localStorage.getItem(STORAGE_KEY); }
    catch (e) { storageAvailable = false; }

    if (raw) {
      let parsed = null;
      try { parsed = JSON.parse(raw); } catch (e) { parsed = null; }

      // v1 -> v2 migration
      if (parsed && parsed.v === 1) {
        state = migrateV1ToV2(parsed);
        saveState();
        return;
      }

      const valid = validateV2(parsed);
      if (valid) {
        const today = getJSTDateString();
        // Normalize defensively (drops unexpected calendar values)
        const normalized = normalizeCalendar(valid.calendar);
        const calendarChanged = Object.keys(normalized).length !== Object.keys(valid.calendar).length;
        valid.calendar = normalized;
        if (valid.date === today) {
          state = valid;
          if (calendarChanged) saveState(); // persist cleanup only if we dropped anything
          return;
        }
        // Different day: reset checks/switched, preserve calendar
        state = makeFreshState(valid.calendar);
        saveState();
        return;
      }
    }

    state = makeFreshState();
    saveState();
  }

  function saveState() {
    if (!storageAvailable) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      storageAvailable = false;
      showWarning();
    }
  }

  function showWarning() {
    const w = document.getElementById('warning');
    if (w) w.hidden = false;
  }

  // ====== Render ======
  function updateDateDisplay() {
    const el = document.getElementById('date');
    if (el) el.textContent = getJSTDateDisplay();
  }

  function renderTodo() {
    const list = document.getElementById('list');
    list.textContent = '';

    ITEMS.forEach(function (label, i) {
      const li = document.createElement('li');
      li.className = 'item' + (state.checked[i] ? ' checked' : '');
      li.setAttribute('role', 'checkbox');
      li.setAttribute('aria-checked', state.checked[i] ? 'true' : 'false');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', label);

      const frame = document.createElement('div');
      frame.className = 'frame';
      const stamp = document.createElement('div');
      stamp.className = 'stamp';
      frame.appendChild(stamp);

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      li.appendChild(frame);
      li.appendChild(labelEl);

      function toggle() {
        state.checked[i] = !state.checked[i];
        if (state.checked[i]) {
          li.classList.add('checked');
          li.setAttribute('aria-checked', 'true');
        } else {
          li.classList.remove('checked');
          li.setAttribute('aria-checked', 'false');
        }
        saveState();
        checkAchievement(true);
      }

      li.addEventListener('click', toggle);
      li.addEventListener('keydown', function (e) {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          toggle();
        }
      });

      list.appendChild(li);
    });
  }

  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.textContent = '';

    const dates = getCalendarDates();
    const today = getJSTDateString();

    dates.forEach(function (dateStr) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      cell.dataset.date = dateStr;

      if (dateStr === today) cell.classList.add('today');

      const stamped = !!state.calendar[dateStr];
      if (stamped) cell.classList.add('stamped-pink');

      // Clickable: past, in range, not yet stamped
      if (dateStr < today && !stamped) {
        cell.classList.add('clickable');
        cell.addEventListener('click', function () { handleCellClick(dateStr); });
      }

      const labelEl = document.createElement('span');
      labelEl.className = 'cal-date';
      const parts = dateStr.split('-');
      labelEl.textContent = (+parts[1]) + '/' + (+parts[2]);
      cell.appendChild(labelEl);

      const stampEl = document.createElement('span');
      stampEl.className = 'cal-stamp';
      cell.appendChild(stampEl);

      grid.appendChild(cell);
    });
  }

  function render() {
    updateDateDisplay();
    renderTodo();
    renderCalendar();
  }

  function findCalendarCell(dateStr) {
    return document.querySelector('.cal-cell[data-date="' + dateStr + '"]');
  }

  // ====== Tab switching ======
  function setActiveTab(tabId) {
    if (activeTab === tabId) return;
    activeTab = tabId;

    document.querySelectorAll('.tab').forEach(function (t) {
      const isActive = t.dataset.tab === tabId;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    document.getElementById('panels').classList.toggle('right-active', tabId === TAB_STAMP);

    document.querySelectorAll('.panel').forEach(function (p) {
      p.classList.toggle('active', p.dataset.tab === tabId);
    });
  }

  function animateTodayStamp() {
    const cell = document.querySelector('.cal-cell.today.stamped-pink');
    if (!cell) return;
    cell.classList.remove('animate');
    void cell.offsetWidth;
    cell.classList.add('animate');
    setTimeout(function () { cell.classList.remove('animate'); }, 400);
  }

  // ====== Achievement detection (pink stamp) ======
  function checkAchievement(triggeredByClick) {
    if (!state || state.switched) return;
    const allChecked = state.checked.every(function (c) { return c === true; });
    if (!allChecked) return;

    state.switched = true;
    const today = getJSTDateString();
    let recorded = false;
    if (isInCalendarRange(today)) {
      state.calendar[today] = true;
      recorded = true;
    }
    saveState();
    renderCalendar();

    if (triggeredByClick && recorded) {
      setTimeout(function () {
        setActiveTab(TAB_STAMP);
        requestAnimationFrame(animateTodayStamp);
      }, AUTO_SWITCH_DELAY_MS);
    }
  }

  // ====== Cell click handler ======
  function handleCellClick(dateStr) {
    const today = getJSTDateString();
    if (dateStr >= today) return;
    if (state.calendar[dateStr]) return; // already stamped
    showStampModal(dateStr);
  }

  // ====== Modal ======
  function showStampModal(dateStr) {
    if (modalCleanup) modalCleanup();

    const overlay = document.getElementById('modal-overlay');
    const titleEl = document.getElementById('modal-title');
    const dateEl  = document.getElementById('modal-date');
    const noBtn   = document.getElementById('modal-no');
    const yesBtn  = document.getElementById('modal-yes');

    const parts = dateStr.split('-');
    const monthDay = (+parts[1]) + '月' + (+parts[2]) + '日';
    const dow = dowFromDateString(dateStr);
    titleEl.textContent = 'スタンプを押しますか？';
    dateEl.textContent = monthDay + '（' + dow + '）';

    const lastFocus = document.activeElement;
    overlay.hidden = false;
    // Focus 「いいえ」by default for safety
    requestAnimationFrame(function () { noBtn.focus(); });

    function close() {
      overlay.hidden = true;
      document.removeEventListener('keydown', escHandler);
      overlay.removeEventListener('click', overlayHandler);
      yesBtn.removeEventListener('click', yesHandler);
      noBtn.removeEventListener('click', noHandler);
      modalCleanup = null;
      if (lastFocus && typeof lastFocus.focus === 'function') {
        try { lastFocus.focus(); } catch (e) {}
      }
    }
    function yesHandler() {
      close();
      addManualStamp(dateStr);
    }
    function noHandler() {
      close();
    }
    function overlayHandler(e) {
      if (e.target === overlay) close();
    }
    function escHandler(e) {
      if (e.key === 'Escape') {
        e.preventDefault();
        close();
      }
    }

    yesBtn.addEventListener('click', yesHandler);
    noBtn.addEventListener('click', noHandler);
    overlay.addEventListener('click', overlayHandler);
    document.addEventListener('keydown', escHandler);

    modalCleanup = close;
  }

  function addManualStamp(dateStr) {
    state.calendar[dateStr] = true;
    saveState();
    renderCalendar();
    requestAnimationFrame(function () {
      const cell = findCalendarCell(dateStr);
      if (cell) {
        cell.classList.add('animate');
        setTimeout(function () { cell.classList.remove('animate'); }, 400);
      }
    });
  }

  // ====== Daily reset check ======
  function checkDateChange() {
    const today = getJSTDateString();
    if (!state || state.date !== today) {
      state = makeFreshState(state ? state.calendar : {});
      saveState();
      render();
    }
  }

  // ====== Init ======
  function init() {
    loadState();
    if (!storageAvailable) showWarning();
    render();

    document.querySelectorAll('.tab').forEach(function (btn) {
      btn.addEventListener('click', function () {
        setActiveTab(btn.dataset.tab);
      });
    });

    setInterval(checkDateChange, 30 * 1000);
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) checkDateChange();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
